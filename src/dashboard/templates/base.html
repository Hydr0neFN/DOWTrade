<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}DOWTrade Dashboard{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { background: #0d1117; }
    .navbar-brand { font-weight: 700; letter-spacing: .5px; }
    .card { background: #161b22; border: 1px solid #30363d; }
    .card-header { background: #1c2128; border-bottom: 1px solid #30363d; font-weight: 600; }
    .stat-card { transition: transform .15s; }
    .stat-card:hover { transform: translateY(-2px); }
    .stat-value { font-size: 1.6rem; font-weight: 700; }
    .stat-label { font-size: .78rem; text-transform: uppercase; letter-spacing: .6px; color: #8b949e; }
    .pnl-pos { color: #3fb950; }
    .pnl-neg { color: #f85149; }
    .badge-long  { background: #1a4731; color: #3fb950; border: 1px solid #2ea043; }
    .badge-short { background: #3d1c1c; color: #f85149; border: 1px solid #da3633; }
    .badge-flat  { background: #1c2128; color: #8b949e; border: 1px solid #30363d; }
    .badge-veto  { background: #2d2a1e; color: #d29922; border: 1px solid #9e6a03; }
    .badge-approved { background: #1a4731; color: #3fb950; border: 1px solid #2ea043; }
    .badge-rejected { background: #3d1c1c; color: #f85149; border: 1px solid #da3633; }
    .reasoning-text { font-size: .82rem; color: #8b949e; line-height: 1.45; white-space: pre-wrap; }
    table { font-size: .9rem; }
    .nav-link.active { background: #1f6feb !important; border-radius: 6px; }
    .heartbeat-dot { display:inline-block; width:.55rem; height:.55rem; border-radius:50%; margin-right:.35rem; vertical-align:middle; }
    .hb-ok { background:#3fb950; box-shadow:0 0 6px #3fb950; }
    .hb-warn { background:#d29922; box-shadow:0 0 6px #d29922; }
    .hb-bad { background:#f85149; box-shadow:0 0 6px #f85149; }
    @media (max-width: 576px) { .stat-value { font-size: 1.2rem; } }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script src="/static/app.js" defer></script>
  {% block head %}{% endblock %}
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-secondary mb-4">
  <div class="container-fluid px-4">
    <a class="navbar-brand" href="/">
      <i class="bi bi-graph-up-arrow me-2 text-primary"></i>DOWTrade
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto gap-1">
        <li class="nav-item"><a class="nav-link {% if request.url.path == '/' %}active{% endif %}" href="/"><i class="bi bi-speedometer2 me-1"></i>Overview</a></li>
        <li class="nav-item"><a class="nav-link {% if request.url.path == '/equity' %}active{% endif %}" href="/equity"><i class="bi bi-cash-stack me-1"></i>Equity</a></li>
        <li class="nav-item"><a class="nav-link {% if request.url.path == '/trades' %}active{% endif %}" href="/trades"><i class="bi bi-clock-history me-1"></i>Trades</a></li>
        <li class="nav-item"><a class="nav-link {% if request.url.path == '/journal' %}active{% endif %}" href="/journal"><i class="bi bi-journal-text me-1"></i>Journal</a></li>
        <li class="nav-item"><a class="nav-link {% if request.url.path == '/disagreements' %}active{% endif %}" href="/disagreements"><i class="bi bi-diagram-3 me-1"></i>Decisions</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container-fluid px-4">
  {% block content %}{% endblock %}
</div>

<footer class="text-center text-secondary mt-5 mb-3" style="font-size:.78rem;">
  Paper trading only &nbsp;&middot;&nbsp; MYM futures &nbsp;&middot;&nbsp; Haiku + Gemini-CLI + DeepSeek &nbsp;&middot;&nbsp; Python safety final word
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
