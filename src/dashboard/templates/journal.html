{% extends "base.html" %}
{% block content %}
<div class="card">
    <h3>Journals</h3>
    <ul>
    {% for j in journals %}
        <li><a href="#" onclick="loadJournal('{{ j.date }}'); return false;">{{ j.date }}</a></li>
    {% endfor %}
    </ul>
    <pre id="journal-content" style="white-space: pre-wrap; word-wrap: break-word;"></pre>
</div>
<script>
function loadJournal(date) {
    fetch('/api/journal/' + date).then(r => r.json()).then(data => {
        document.getElementById('journal-content').textContent = data.markdown;
    });
}
</script>
{% endblock %}
